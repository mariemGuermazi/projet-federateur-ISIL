<div class="requests-shell">
  <section class="requests-card">
    <div class="top-actions">
      <button class="btn btn-secondary" type="button" routerLink="/dashboard">Back to Dashboard</button>
      <button class="btn btn-secondary" type="button" routerLink="/owner-requests">Owner Requests</button>
    </div>

    <h2>My Borrow Requests</h2>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="requests-list" *ngIf="requests.length > 0; else emptyState">
      <article class="request-card" *ngFor="let request of requests">
        <h3>{{ request.item_title || ('Item #' + request.item_id) }}</h3>
        <p><strong>Period:</strong> {{ request.start_date | date:'mediumDate' }} - {{ request.end_date | date:'mediumDate' }}</p>
        <p><strong>Status:</strong> <span class="status">{{ request.status }}</span></p>
      </article>
    </div>

    <ng-template #emptyState>
      <p class="empty">No borrow requests yet.</p>
    </ng-template>
  </section>
</div>
