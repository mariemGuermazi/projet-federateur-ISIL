<div class="items-shell">
  <section class="items-card">
    <div class="items-head">
      <h2>Available Items</h2>
      <p>Browse all published items and open details in one click.</p>
    </div>

    <div class="top-actions">
      <button class="btn btn-secondary" type="button" routerLink="/dashboard">Back to Dashboard</button>
      <button class="btn btn-primary" type="button" routerLink="/add-item">Publish New Item</button>
    </div>

    <div class="section-head">
      <h3>Items Catalog</h3>
      <span>{{ items.length }} items</span>
    </div>

    <div class="items-grid" *ngIf="items.length > 0; else emptyState">
      <article class="item-card" *ngFor="let item of items">
        <div class="item-top">
          <h4>{{ item.title }}</h4>
          <span class="badge">Deposit {{ item.deposit || 0 }} $</span>
        </div>

        <p>{{ item.description || 'No description provided.' }}</p>

        <button class="btn btn-secondary" (click)="viewItem(item.id)">View Details</button>
      </article>
    </div>

    <ng-template #emptyState>
      <div class="empty-state">
        <p>No items found.</p>
        <button class="btn btn-primary" type="button" routerLink="/add-item">Publish First Item</button>
      </div>
    </ng-template>
  </section>
</div>
