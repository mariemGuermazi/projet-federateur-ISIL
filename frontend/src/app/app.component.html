<nav class="navbar">
  <h2>ShareBox</h2>

  <div class="links">
    <a *ngIf="!isLoggedIn()" routerLink="/login" routerLinkActive="active">Login</a>
    <a *ngIf="!isLoggedIn()" routerLink="/register" routerLinkActive="active">Register</a>
    <a *ngIf="isLoggedIn()" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a *ngIf="isLoggedIn()" routerLink="/items" routerLinkActive="active">Items</a>
    <a *ngIf="isLoggedIn()" routerLink="/add-item" routerLinkActive="active">Published Items</a>

    <div *ngIf="isLoggedIn()" class="notif-wrapper">
      <button type="button" class="notif-btn" (click)="toggleNotifications()">
        🔔 {{ notifications.length }}
      </button>

      <div class="notif-dropdown" *ngIf="showNotifications">
        <div *ngIf="notifications.length === 0" class="notif-empty">
          No notifications
        </div>

        <div *ngFor="let notif of notifications" class="notif-item">
          <span class="notif-title">{{ notif.item_title || 'Unknown item' }}</span>
          <span class="notif-status" [ngClass]="getStatusClass(notif.status)">
            {{ notif.status }}
          </span>
        </div>
      </div>
    </div>

    <button *ngIf="isLoggedIn()" type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <router-outlet></router-outlet>
</div>
